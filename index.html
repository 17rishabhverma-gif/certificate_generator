<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Your Super Star Certificate!</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&family=Noto+Sans+Devanagari:wght@700&display=swap" rel="stylesheet">
<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Comic Neue', cursive;
  overflow: hidden;
  background-color: #000;
}

/* --- Carousel --- */
.carousel-container {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  z-index: 1;
}

.carousel {
  display: flex;
  align-items: stretch;
  height: 100%;
  width: max-content;
  animation: marquee 30s linear infinite;
}

.carousel img {
  height: 100vh;
  width: auto;
  flex: 0 0 auto;
  object-fit: cover;
  margin-right: 0.5rem;
  border-radius: 10px;
}

@keyframes marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* --- Certificate Box --- */
.wrapper {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 1rem;
  z-index: 20;
}

.certificate-box {
  width: 90%;
  max-width: 520px;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(2px);
  padding: 1rem;
  border-radius: 1rem;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  z-index: 21;
}

#certificateCanvas {
  width: 100% !important;
  height: auto !important;
  background-color: transparent;
  display: none;
  border-radius: 8px;
  z-index: 22;
}

/* --- Participant Counter Box --- */
.participant-box {
  position: fixed;
  top: 1.5rem;
  left: 1.5rem;
  z-index: 10;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(5px);
  padding: 1rem;
  border-radius: 1rem;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border: 1px solid #facc15;
  text-align: center;
  min-width: 140px;
  max-width: 200px;
}

.participant-box p {
  color: #facc15;
  font-size: 1rem;
  font-weight: 600;
  margin-bottom: 0.25rem;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
}

.participant-box .counter-content {
  transform: scale(1.1);
}

/* --- Responsive adjustments --- */
@media (max-width: 640px) {
  .certificate-box {
    width: 100%;
    padding: 0.75rem;
  }
  h1 {
    font-size: 1.25rem;
  }
  .participant-box {
    top: 0.5rem;
    left: 0.5rem;
    min-width: 120px;
    padding: 0.5rem;
  }
  .participant-box .counter-content {
    transform: scale(1);
  }
}

@media (min-width: 1024px) {
  .carousel img {
    width: 25vw;
    max-width: 420px;
  }
}
</style>
</head>
<body>

<div class="wrapper">
  <div class="certificate-box rounded-2xl">
    <h1 class="text-lg sm:text-2xl font-bold mb-4 text-center text-black">Create Your Super Star Certificate!</h1>

    <div class="mb-4 text-center space-y-3">
      <label for="userName" class="block text-sm sm:text-lg font-medium text-red-600">Type Your Name, Super Star!</label>
      <input id="userName" type="text" placeholder="Your Awesome Name" class="mt-1 block w-full sm:w-4/5 mx-auto p-2 sm:p-3 border-2 border-yellow-300 rounded-lg focus:outline-none focus:ring-4 focus:ring-purple-400 bg-blue-50 text-gray-800 placeholder-gray-400" />

      <!-- Language radio buttons -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-center gap-2 sm:gap-4 mb-2">
        <label class="inline-flex items-center gap-2 justify-center">
          <input type="radio" name="langSelect" value="en" checked class="accent-purple-600">
          <span class="text-sm font-semibold">English</span>
        </label>
        <label class="inline-flex items-center gap-2 justify-center">
          <input type="radio" name="langSelect" value="hi" class="accent-purple-600">
          <span class="text-sm font-semibold">Hindi (देवनागरी)</span>
        </label>
      </div>

      <div class="text-xs sm:text-sm text-gray-700">
        <span class="font-semibold">Preview:</span>
        <span id="namePreview">—</span>
      </div>
    </div>

    <div class="mb-4">
      <canvas id="certificateCanvas" class="w-full border-4 border-dashed border-green-400 rounded-lg"></canvas>
    </div>

    <button id="generateBtn" class="w-full bg-purple-600 text-white py-2 sm:py-3 px-4 rounded-lg hover:bg-purple-700 disabled:bg-gray-400 text-sm sm:text-lg font-bold" disabled>Make My Certificate!</button>
    <button id="downloadBtn" class="w-full bg-green-600 text-white py-2 sm:py-3 px-4 rounded-lg hover:bg-green-700 text-sm sm:text-lg font-bold mt-4 hidden">Download Your Certificate!</button>
  </div>
</div>

<!-- Participant Counter Box -->
<div class="participant-box">
  <p>Participants</p>
  <div class="counter-content">
    <a href="https://www.free-counters.org/" target="_blank" class="hidden">free-counters.org</a>
    <script type="text/javascript" src="https://www.free-counters.org/count/ju96"></script>
    <script type='text/javascript' src='https://www.whomania.com/ctr?id=25010db8a284f089882c099a9c2820572b0ae9dc'></script>
  </div>
</div>

  </div>
</div>

const certificateImage = new Image();
certificateImage.crossOrigin = "anonymous";
certificateImage.src = certificateBase64;

function getSelectedLang() {
  const radios = document.getElementsByName('langSelect');
  for(const r of radios){ if(r.checked) return r.value; }
  return 'en';
}

async function translateName(name, lang) {
  if(!name) return '';
  if(lang==='en') return name;
  try {
    const res = await fetch(`https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=hi&dt=t&q=${encodeURIComponent(name)}`);
    const data = await res.json();
    return data[0].map(item=>item[0]).join('');
  } catch(err){ console.error(err); return name; }
}

async function updatePreview(redraw=false){
  const text = userName.value.trim();
  if(!text){ namePreview.textContent='—'; generateBtn.disabled=true; return; }
  generateBtn.disabled=false;

  translatedName = await translateName(text, getSelectedLang());
  namePreview.textContent = translatedName;

  if(redraw && certificateGenerated) generateCertificate();
}

userName.addEventListener('input', ()=>updatePreview(certificateGenerated));
document.getElementsByName('langSelect').forEach(radio=>radio.addEventListener('change', ()=>updatePreview(certificateGenerated)));
updatePreview();

function generateCertificate(){
  if(!translatedName) return;
  canvas.style.display='block';
  downloadBtn.classList.remove('hidden');
  generateBtn.style.display = 'none';
  certificateGenerated = true;

  canvas.width = certificateImage.width || 1200;
  canvas.height = certificateImage.height || 780;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(certificateImage.complete && certificateImage.naturalWidth>0){
    ctx.drawImage(certificateImage,0,0,canvas.width,canvas.height);
  } else {
    ctx.fillStyle='#fff';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  ctx.font = 'bold 40px '+(/[\u0900-\u097F]/.test(translatedName)?'"Noto Sans Devanagari",Arial':'Arial');
  ctx.fillStyle='black';
  ctx.textAlign='center';
  ctx.fillText(translatedName,canvas.width/2,canvas.height*0.5);
}

generateBtn.addEventListener('click', generateCertificate);

downloadBtn.addEventListener('click', ()=>{
  const img = canvas.toDataURL('image/png');
  const pdf = new jsPDF({
    orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
    unit: 'px',
    format: [canvas.width, canvas.height]
  });
  pdf.addImage(img,'PNG',0,0,canvas.width,canvas.height);
  pdf.save('certificate.pdf');
});
</script>
